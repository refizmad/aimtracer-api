# Production stack: Postgres + aimtrace-api + Caddy (HTTPS).
# From repo root of aimtrace-api:
#   cp deploy/.env.example deploy/.env   # fill secrets
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#
# Local-only DB (dev) stays in ../docker-compose.yml

name: aimtrace-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aimtrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-aimtrace}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aimtrace} -d ${POSTGRES_DB:-aimtrace}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Compose service hostname for Postgres (overrides host-style DATABASE_URL if you use the template).
      DATABASE_URL: postgresql://${POSTGRES_USER:-aimtrace}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aimtrace}?schema=public
      PORT: "5500"
      NODE_ENV: production
    expose:
      - "5500"
    networks:
      - internal
      - edge
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5500/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.aimtracer.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

  # Optional one-shot / cron-friendly backup sidecar. Not always-on:
  #   docker compose -f deploy/docker-compose.yml --env-file deploy/.env run --rm backup
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-aimtrace}
      POSTGRES_DB: ${POSTGRES_DB:-aimtrace}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-backups/postgres}
    volumes:
      - ./backups:/backups
      - ./backup-pg.sh:/backup-pg.sh:ro
    entrypoint: ["/bin/sh", "/backup-pg.sh"]
    networks:
      - internal

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
  edge:
